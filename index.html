<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลา WFH - โรงเรียนชลบุรี "สุขบท"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .bg-pastel-primary { background-color: #fce7f3; }
        .bg-pastel-btn { background-color: #f472b6; }
        .bg-pastel-btn:hover { background-color: #ec4899; }
        .text-pastel-dark { color: #831843; }
        .border-pastel { border-color: #fbcfe8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-8 px-4 bg-pink-50">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border-4 border-pink-100">
        
        <!-- Header with Logo (Updated) -->
        <div class="bg-gradient-to-r from-pink-100 to-rose-100 p-6 text-center border-b border-pink-200">
            <div class="flex justify-center mb-3">
                <img src="https://lh3.googleusercontent.com/d/1man6nxO40U4rp61zCfAIqXqRPicruA5F=w150-h150" 
                     alt="Logo School" 
                     class="h-20 w-20 object-contain drop-shadow-md rounded-full bg-white p-1"
                     onerror="this.onerror=null; this.src='https://via.placeholder.com/100x100/fbcfe8/831843?text=Logo';">
            </div>
            <h1 class="text-pink-800 text-lg font-bold">โรงเรียนชลบุรี "สุขบท"</h1>
            <p class="text-pink-600 text-sm mt-1">ระบบลงเวลาปฏิบัติราชการ (Work From Home)</p>
        </div>

        <!-- Real-time Clock -->
        <div class="bg-pink-50 p-4 text-center border-b border-pink-100">
            <p class="text-pink-400 text-xs uppercase tracking-wide font-semibold">เวลาปัจจุบัน (Real-time)</p>
            <div id="realtime-clock" class="text-3xl font-bold text-pink-700 mt-1 font-mono">
                00:00:00
            </div>
            <div id="realtime-date" class="text-gray-500 text-sm mt-1">
                -
            </div>
            <p class="text-xs text-pink-300 mt-2 font-medium">* เวลาถูกกำหนดโดยระบบ ไม่สามารถแก้ไขได้</p>
        </div>

        <!-- Form -->
        <form id="checkinForm" class="p-6 space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-pink-800 mb-1">ชื่อ</label>
                <input type="text" id="firstname" required placeholder="ระบุชื่อจริง" 
                    class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition bg-pink-50/50">
            </div>

            <div>
                <label class="block text-sm font-medium text-pink-800 mb-1">นามสกุล</label>
                <input type="text" id="lastname" required placeholder="ระบุนามสกุล" 
                    class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition bg-pink-50/50">
            </div>

            <div>
                <label class="block text-sm font-medium text-pink-800 mb-1">หมวด / กลุ่มสาระฯ / ฝ่าย</label>
                <select id="department" required 
                    class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition bg-white">
                    <option value="" disabled selected>-- กรุณาเลือกหมวดหมู่ --</option>
                    <option value="วิทยาศาสตร์">วิทยาศาสตร์</option>
                    <option value="คณิตศาสตร์">คณิตศาสตร์</option>
                    <option value="ภาษาไทย">ภาษาไทย</option>
                    <option value="สังคม">สังคม</option>
                    <option value="การงาน">การงาน</option>
                    <option value="พลศึกษา">พลศึกษา</option>
                    <option value="เทคโนโลยี">เทคโนโลยี</option>
                    <option value="ศิลปะ">ศิลปะ</option>
                    <option value="แนะแนว">แนะแนว</option>
                    <option value="บุคลากร">บุคลากร</option>
                    <option value="พนักงานราชการ">พนักงานราชการ</option>
                    <option value="ครูอัตราจ้าง">ครูอัตราจ้าง</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition duration-200 flex justify-center items-center gap-2 mt-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                ยืนยันการลงเวลา (Check-in)
            </button>
        </form>

        <!-- Result Area -->
        <div id="resultArea" class="hidden bg-pink-50 border-t border-pink-200 p-6 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-pink-100 text-pink-500 mb-3 animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-pink-800 font-bold text-lg mb-2">บันทึกข้อมูลสำเร็จ</h3>
            <p id="successMessage" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line bg-white p-3 rounded-lg border border-pink-100 shadow-sm">
            </p>
            <button onclick="location.reload()" class="mt-4 text-pink-500 text-sm font-semibold hover:text-pink-700 transition">
                ลงเวลาอีกครั้ง
            </button>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center z-10">
            <div class="flex flex-col items-center">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-300 border-t-pink-600 mb-2"></div>
                <span class="text-pink-600 text-sm font-medium">กำลังบันทึกข้อมูล...</span>
            </div>
        </div>

    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzf_TVZO5KiG8ycTJCixlDlLyyfa95NKmFG_e76HGmHrIShO0IBuuP-rl5CcdaF-d9q/exec';

        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateString = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('realtime-clock').innerText = timeString;
            document.getElementById('realtime-date').innerText = dateString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('checkinForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loadingOverlay');
            const resultArea = document.getElementById('resultArea');
            
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            loading.classList.remove('hidden');

            const now = new Date();
            const checkInTime = now.toLocaleString('th-TH');
            let locationText = "สถานที่พำนัก (Work From Home)";
            
            const payload = {
                firstname: document.getElementById('firstname').value,
                lastname: document.getElementById('lastname').value,
                department: document.getElementById('department').value,
                location: locationText,
                timestamp: checkInTime
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const msg = `ท่านได้ลงเวลาปฏิบัติราชการแล้ว ณ ${checkInTime}\n\nโดยท่านอยู่ ณ ${locationText}`;
                document.getElementById('successMessage').innerText = msg;
                
                document.getElementById('checkinForm').classList.add('hidden');
                resultArea.classList.remove('hidden');

            } catch (error) {
                console.error('Error:', error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง');
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
